# Peer 3 configuration
# INI format: key = value
# Lines beginning with '#' or ';' are comments.
# Blank lines are ignored.
#
# peer_id   : integer 1..4 identifying this node
# bind_ip   : local IP to bind (default 0.0.0.0)
# bind_port : UDP port to listen on (1..65535)
# render_hz, network_hz, simulation_hz : optional loop frequencies
#
# peers     : comma-separated list of all peers in the simulation,
#             each in the form  <peerId>@<host>:<port>
#             e.g.  peers = 1@192.168.1.10:9001, 2@192.168.1.11:9002
#             Include self so every node has a complete view of the mesh.

peer_id    = 3
bind_ip    = 0.0.0.0
bind_port  = 9003

render_hz     = 60
network_hz    = 60
simulation_hz = 120

peers = 1@127.0.0.1:9001, 2@127.0.0.1:9002, 3@127.0.0.1:9003, 4@127.0.0.1:9004
